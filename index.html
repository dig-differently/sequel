<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQL Weekend — Ticketing Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
  :root{
    --paper:#f5f2ec;
    --ink:#111111;
    --ink-soft:#3a3a3a;
    --ink-dim:#6b6b6b;
    --rule:#2a2a2a;
    --line:#d9d3c7;
    --accent:#c8411e;
    --accent-soft:#e8d7cc;
    --good:#1e6b3a;
    --good-soft:#d4e4d7;
    --bad:#a01818;
    --code-bg:#1a1a1a;
    --code-fg:#f5f2ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6}
  body{min-height:100vh}
  ::selection{background:var(--ink);color:var(--paper)}

  .masthead{
    border-bottom:2px solid var(--ink);
    padding:28px 40px 20px;
    display:flex;justify-content:space-between;align-items:flex-end;gap:40px;
  }
  .masthead-left .kicker{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:6px;
  }
  .masthead-title{
    font-family:'Fraunces',serif;
    font-weight:900;font-size:56px;line-height:0.95;letter-spacing:-0.02em;
    font-variation-settings:"opsz" 144;
  }
  .masthead-title em{font-style:italic;font-weight:400;color:var(--accent)}
  .masthead-right{text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim)}
  .masthead-right .issue{font-size:14px;color:var(--ink);margin-bottom:4px}
  .progress-bar{
    margin-top:8px;width:220px;height:2px;background:var(--line);
    position:relative;overflow:hidden;
  }
  .progress-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--ink);transition:width 0.4s ease}

  .page{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 110px)}
  .sidebar{
    border-right:1px solid var(--line);
    padding:32px 24px;
    position:sticky;top:0;align-self:start;
    max-height:100vh;overflow-y:auto;
  }
  .sidebar-heading{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-dim);
    margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line);
  }
  .day-label{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;
    font-size:18px;margin:18px 0 10px;color:var(--ink);
  }
  .day-label:first-of-type{margin-top:0}
  .lesson-item{
    display:flex;align-items:baseline;gap:10px;padding:8px 10px;cursor:pointer;
    border-radius:2px;transition:background 0.15s;margin:2px -10px;
    position:relative;
  }
  .lesson-item:hover{background:rgba(0,0,0,0.04)}
  .lesson-item.active{background:var(--ink);color:var(--paper)}
  .lesson-item.active .lesson-num{color:var(--paper)}
  .lesson-num{
    font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-dim);
    min-width:24px;letter-spacing:0.05em;
  }
  .lesson-title{font-size:13px;line-height:1.3;flex:1}
  .lesson-check{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    font-size:11px;color:var(--good);font-weight:700;
  }
  .lesson-item.active .lesson-check{color:var(--paper)}

  .main{padding:48px 60px;max-width:900px}
  .article-header{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--line)}
  .article-kicker{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);
    margin-bottom:12px;
  }
  h1.article-title{
    font-family:'Fraunces',serif;font-weight:700;font-size:42px;line-height:1.05;
    letter-spacing:-0.015em;margin-bottom:12px;font-variation-settings:"opsz" 144;
  }
  .article-dek{
    font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:19px;line-height:1.45;color:var(--ink-soft);max-width:640px;
  }
  .article-meta{
    margin-top:16px;display:flex;gap:20px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--ink-dim);
  }

  .section{margin:32px 0}
  .section h2{
    font-family:'Fraunces',serif;font-weight:600;font-size:24px;
    margin-bottom:12px;letter-spacing:-0.01em;
  }
  .section h3{
    font-family:'Inter',sans-serif;font-weight:600;font-size:15px;
    text-transform:uppercase;letter-spacing:0.1em;margin:20px 0 10px;color:var(--ink-soft);
  }
  .section p{margin-bottom:14px;font-size:15.5px;line-height:1.65}
  .section p.lead{font-size:17px;line-height:1.6;font-family:'Fraunces',serif;font-weight:400}
  .section ul,.section ol{margin:10px 0 16px 20px}
  .section li{margin-bottom:6px;font-size:15px}
  .section strong{font-weight:600}
  .section em{font-style:italic}
  .section code{
    font-family:'JetBrains Mono',monospace;font-size:13px;
    background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:2px;
  }

  .callout{
    border-left:3px solid var(--accent);
    padding:14px 18px;margin:20px 0;
    background:var(--accent-soft);
    font-family:'Fraunces',serif;font-size:15.5px;line-height:1.5;
  }
  .callout-label{
    display:block;font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);
    margin-bottom:6px;font-weight:700;
  }

  .code-example{
    background:var(--code-bg);color:var(--code-fg);
    font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;
    padding:18px 22px;border-radius:3px;margin:14px 0;
    overflow-x:auto;white-space:pre;
    position:relative;
  }
  .code-example::before{
    content:"SQL";
    position:absolute;top:10px;right:14px;
    font-size:9px;letter-spacing:0.2em;color:#666;
  }

  .editor-block{
    margin:24px 0;border:1px solid var(--ink);border-radius:3px;overflow:hidden;
    background:#fff;
  }
  .editor-header{
    background:var(--ink);color:var(--paper);
    padding:8px 14px;display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;
  }
  .editor-header-label{text-transform:uppercase}
  .editor-textarea{
    width:100%;min-height:120px;border:none;outline:none;
    font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.6;
    padding:16px 18px;background:#fff;color:var(--ink);resize:vertical;
    tab-size:2;
  }
  .editor-actions{
    display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--line);
    background:#fafafa;
  }
  button{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
    padding:7px 14px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);
    cursor:pointer;border-radius:2px;letter-spacing:0.02em;
    transition:all 0.15s;
  }
  button:hover{background:var(--accent);border-color:var(--accent)}
  button.secondary{background:transparent;color:var(--ink)}
  button.secondary:hover{background:var(--ink);color:var(--paper)}
  button.ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line)}
  button.ghost:hover{border-color:var(--ink);color:var(--ink)}
  button:disabled{opacity:0.5;cursor:not-allowed}

  .results{padding:14px 18px;border-top:1px solid var(--line);background:#fafaf7;max-height:320px;overflow:auto}
  .results-meta{
    font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim);
    margin-bottom:8px;
  }
  .results-error{color:var(--bad);font-family:'JetBrains Mono',monospace;font-size:12px;white-space:pre-wrap}
  .results-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:12px}
  .results-table th{
    text-align:left;padding:6px 10px;background:var(--ink);color:var(--paper);
    font-weight:500;letter-spacing:0.05em;font-size:11px;
  }
  .results-table td{padding:5px 10px;border-bottom:1px solid var(--line)}
  .results-table tr:hover td{background:rgba(0,0,0,0.03)}

  .exercise{
    border:1px dashed var(--ink);padding:20px 24px;margin:24px 0;
    background:rgba(200,65,30,0.03);
  }
  .exercise-label{
    font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:700;
    margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  }
  .exercise-prompt{
    font-family:'Fraunces',serif;font-size:17px;line-height:1.5;margin-bottom:12px;
  }
  .business-context{
    font-family:'Inter',sans-serif;font-size:13px;line-height:1.55;
    color:var(--ink-soft);margin-bottom:12px;font-style:italic;
    padding:8px 12px;background:rgba(0,0,0,0.03);border-radius:2px;
  }
  .solution{
    margin-top:14px;padding-top:14px;border-top:1px dotted var(--line);
    display:none;
  }
  .solution.open{display:block}
  .solution-label{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px;
  }

  .schema-toggle{
    position:fixed;bottom:20px;right:20px;z-index:10;
    background:var(--ink);color:var(--paper);
    padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:0.1em;border-radius:20px;cursor:pointer;
    border:none;box-shadow:0 4px 20px rgba(0,0,0,0.15);
    text-transform:uppercase;
  }
  .schema-panel{
    position:fixed;bottom:0;right:0;width:440px;max-height:75vh;
    background:#fff;border-left:1px solid var(--ink);border-top:1px solid var(--ink);
    padding:20px 24px;overflow-y:auto;z-index:9;
    transform:translateY(100%);transition:transform 0.3s cubic-bezier(.7,.2,.3,1);
    box-shadow:-4px -4px 20px rgba(0,0,0,0.08);
  }
  .schema-panel.open{transform:translateY(0)}
  .schema-panel h3{font-family:'Fraunces',serif;font-size:20px;margin-bottom:14px}
  .schema-table{margin-bottom:18px}
  .schema-table-name{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
    color:var(--accent);margin-bottom:4px;
  }
  .schema-cols{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-soft);line-height:1.6;padding-left:12px}
  .schema-cols span{color:var(--ink-dim)}

  .lesson-nav{
    display:flex;justify-content:space-between;gap:20px;
    margin:48px 0 20px;padding-top:24px;border-top:1px solid var(--line);
  }
  .nav-btn{
    display:flex;flex-direction:column;gap:2px;padding:14px 18px;
    border:1px solid var(--line);cursor:pointer;text-decoration:none;color:var(--ink);
    background:#fff;min-width:180px;transition:all 0.15s;
    font-family:'Inter',sans-serif;border-radius:2px;
  }
  .nav-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--paper)}
  .nav-btn:hover .nav-label{color:var(--paper)}
  .nav-btn.next{text-align:right;margin-left:auto}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-dim)}
  .nav-title{font-family:'Fraunces',serif;font-size:15px;font-weight:500}

  .loading{
    position:fixed;inset:0;background:var(--paper);
    display:flex;align-items:center;justify-content:center;z-index:100;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.15em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .loading.hide{display:none}

  .schedule{margin:24px 0}
  .schedule-day{
    border:1px solid var(--line);margin-bottom:12px;padding:16px 20px;
    background:#fff;
  }
  .schedule-day-title{
    font-family:'Fraunces',serif;font-weight:600;font-size:18px;
    margin-bottom:4px;
  }
  .schedule-day-meta{
    font-family:'JetBrains Mono',monospace;font-size:11px;
    color:var(--ink-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;
  }
  .schedule-items{display:flex;flex-wrap:wrap;gap:8px}
  .schedule-chip{
    font-family:'JetBrains Mono',monospace;font-size:11px;
    padding:4px 9px;background:var(--paper);border:1px solid var(--line);border-radius:2px;
  }

  .interview-tip{
    background:#fff;border:1px solid var(--ink);
    padding:16px 20px;margin:20px 0;border-radius:2px;
    position:relative;
  }
  .interview-tip-label{
    position:absolute;top:-8px;left:14px;background:var(--ink);color:var(--paper);
    font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;
    padding:3px 8px;text-transform:uppercase;
  }
  .interview-tip p{font-size:14px;margin-top:6px;margin-bottom:0}

  @media(max-width:860px){
    .page{grid-template-columns:1fr}
    .sidebar{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--line)}
    .main{padding:32px 24px}
    .masthead{flex-direction:column;align-items:flex-start;gap:16px;padding:20px 24px}
    .masthead-title{font-size:38px}
    h1.article-title{font-size:30px}
    .schema-panel{width:100%}
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div>Loading database engine…</div>
</div>

<header class="masthead">
  <div class="masthead-left">
    <div class="kicker">A Two-Day Intensive · Ticketing Edition</div>
    <h1 class="masthead-title">SQL <em>Weekend</em></h1>
  </div>
  <div class="masthead-right">
    <div class="issue">Vol. 2 — The Box Office</div>
    <div id="progress-label">Progress 0 / 10</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
  </div>
</header>

<div class="page">
  <aside class="sidebar">
    <div class="sidebar-heading">Curriculum</div>
    <div class="day-label">Saturday — Foundations</div>
    <div id="saturday-lessons"></div>
    <div class="day-label">Sunday — Advanced</div>
    <div id="sunday-lessons"></div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--line)">
      <button class="ghost" style="width:100%" onclick="resetProgress()">Reset Progress</button>
    </div>
  </aside>

  <main class="main" id="main-content"></main>
</div>

<button class="schema-toggle" onclick="document.getElementById('schema-panel').classList.toggle('open')">
  Schema ↗
</button>

<div class="schema-panel" id="schema-panel">
  <h3>The Database</h3>
  <p style="font-family:'Fraunces',serif;font-style:italic;color:var(--ink-soft);margin-bottom:18px;font-size:14px">A live event ticketing platform. Six tables modeled on real ticketing operations.</p>
  <div id="schema-content"></div>
</div>

<script>
// ============================================================
// CURRICULUM — TICKETING EDITION
// ============================================================
const lessons = [
  // SATURDAY
  { day:'sat', num:'01', title:'Reading the Table',
    kicker:'Module 1 · The SELECT Statement',
    heading:'Reading the Table',
    dek:'Every analyst session at a ticketing company starts the same way: which events are on sale, what venues are involved, who bought what. SELECT is how you ask.',
    content:`
      <div class="section">
        <p class="lead">SQL is a language for asking questions about data. You describe <em>what</em> you want; the database figures out <em>how</em> to get it. At a ticketing company, that database holds events, venues, customers, and millions of transactions — and SELECT is your way in.</p>
        <p>The most basic question: <strong>show me some rows from a table</strong>.</p>
        <h3>Anatomy of a SELECT</h3>
        <div class="code-example">SELECT column_1, column_2
FROM table_name;</div>
        <p>Two keywords: <code>SELECT</code> (which columns) and <code>FROM</code> (which table). The semicolon is conventional but optional in most editors.</p>
        <p>To grab everything:</p>
        <div class="code-example">SELECT * FROM events;</div>
        <p>In a real ticketing data warehouse, the <code>tickets</code> table has tens of millions of rows. <code>SELECT *</code> with no filter would either time out or scan a column you didn't need. Discipline starts now: <em>name your columns</em>.</p>
        <h3>DISTINCT and LIMIT</h3>
        <ul>
          <li><code>DISTINCT</code> — return only unique values (e.g., which cities are we selling tickets in?)</li>
          <li><code>LIMIT n</code> — cap rows returned, useful for peeking at a table you've never seen</li>
        </ul>
        <div class="code-example">-- Which cities have venues?
SELECT DISTINCT city FROM venues;

-- Quick look at the events table
SELECT * FROM events LIMIT 5;</div>
      </div>

      <div class="callout">
        <span class="callout-label">On Style</span>
        SQL keywords are conventionally written in UPPERCASE. The database doesn't care, but uppercase keywords make queries legible at a glance — especially in Slack, where reviewers scan quickly.
      </div>

      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>If asked "how would you start exploring a new dataset," <code>SELECT * FROM table LIMIT 10</code> is the right first move. Then <code>SELECT COUNT(*) FROM table</code> to know its size. Senior interviewers look for this discipline.</p>
      </div>

      <div class="section">
        <h3>Try It</h3>
        <p>Run the query below. Then modify it. The database is live — break things freely.</p>
      </div>
    `,
    starter:`-- A look at the events catalog
SELECT name, event_type, event_date, venue_id
FROM events
LIMIT 5;`,
    exercises:[
      { prompt:'Return the first 10 customers — just their names and the city they live in.',
        context:'A marketing manager asks: "give me a sample of who\'s in our database."',
        solution:`SELECT name, city FROM customers LIMIT 10;` },
      { prompt:'List every distinct event type we sell tickets for. Alphabetize the list.',
        context:'Useful for building a category dropdown filter on the AXS site.',
        solution:`SELECT DISTINCT event_type FROM events ORDER BY event_type;` },
      { prompt:'Return the names of the first 8 venues, with their city and capacity.',
        context:'You\'re briefing the operations team on which venues you have data for.',
        solution:`SELECT name, city, capacity FROM venues LIMIT 8;` },
    ]
  },

  { day:'sat', num:'02', title:'Filtering with WHERE',
    kicker:'Module 2 · The WHERE Clause',
    heading:'Filtering with WHERE',
    dek:'You rarely want every row. You want the rows that match a condition: tickets sold today, events in LA, premium-tier seats. WHERE is the filter, and it\'s where queries start to feel powerful.',
    content:`
      <div class="section">
        <p class="lead">The WHERE clause filters rows. Every row gets checked against your condition; only the matches come back.</p>
        <div class="code-example">SELECT name, event_date
FROM events
WHERE event_type = 'Concert';</div>
        <h3>Comparison operators</h3>
        <ul>
          <li><code>=</code> equals (single <code>=</code>, not <code>==</code>)</li>
          <li><code>&lt;&gt;</code> or <code>!=</code> not equal</li>
          <li><code>&lt;</code> <code>&gt;</code> <code>&lt;=</code> <code>&gt;=</code> the math kind</li>
        </ul>
        <h3>Combining conditions</h3>
        <p>Stack with <code>AND</code>, <code>OR</code>, <code>NOT</code>. Use parentheses to make precedence explicit — free, and it prevents bugs.</p>
        <div class="code-example">-- Sold-out shows in LA next month
SELECT name, event_date, status
FROM events
WHERE city = 'Los Angeles'
  AND status = 'sold_out'
  AND event_date BETWEEN '2026-05-01' AND '2026-05-31';</div>
        <h3>Handy shortcuts</h3>
        <ul>
          <li><code>IN (...)</code> — value matches any in a list</li>
          <li><code>BETWEEN a AND b</code> — inclusive range, common for date windows</li>
          <li><code>LIKE</code> — pattern match; <code>%</code> any chars, <code>_</code> one char</li>
          <li><code>IS NULL</code> / <code>IS NOT NULL</code> — NULL is "unknown," not a value</li>
        </ul>
        <div class="code-example">SELECT * FROM events WHERE city IN ('Los Angeles', 'San Francisco', 'San Diego');
SELECT * FROM tickets WHERE price BETWEEN 50 AND 200;
SELECT * FROM customers WHERE email LIKE '%@gmail.com';
SELECT * FROM tickets WHERE refunded_at IS NOT NULL;</div>
      </div>

      <div class="callout">
        <span class="callout-label">NULL is Weird</span>
        NULL means "unknown," not "empty." Any comparison with NULL — <code>= NULL</code>, <code>&lt;&gt; NULL</code> — returns NULL, not true. Use <code>IS NULL</code> and <code>IS NOT NULL</code>. Every NULL bug in your career traces to this. In ticketing, fields like <code>refunded_at</code> or <code>resold_at</code> are <em>usually</em> NULL — that's how you find tickets that <em>weren't</em> refunded.
      </div>

      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>"Find all tickets that weren't refunded" is a classic trap. <code>WHERE refunded_at != NULL</code> returns zero rows. The right answer is <code>WHERE refunded_at IS NULL</code>. Practice catching this.</p>
      </div>
    `,
    starter:`-- Tickets sold in March 2026 for over $200
SELECT id, event_id, price, tier, purchased_at
FROM tickets
WHERE price > 200
  AND purchased_at BETWEEN '2026-03-01' AND '2026-03-31'
  AND status = 'valid';`,
    exercises:[
      { prompt:'Find all events scheduled in 2026 in either Los Angeles or New York. Show name, city, and event_date.',
        context:'A regional marketing lead wants to plan promo for major-market events.',

  { day:'sat', num:'03', title:'Sorting and Limiting',
    kicker:'Module 3 · ORDER BY and LIMIT',
    heading:'Top Tens and Time Series',
    dek:'Most ticketing dashboards reduce to "top N" or "newest first." ORDER BY tells the database the sort order. LIMIT tells it to stop. Together they\'re the workhorse of analyst reports.',
    content:`
      <div class="section">
        <p class="lead">By default, a SELECT returns rows in whatever order is convenient for the engine. Not random, but not reliable. If you want a specific order, say so.</p>
        <div class="code-example">-- Most expensive tickets first
SELECT id, tier, price
FROM tickets
ORDER BY price DESC;</div>
        <p><code>ASC</code> ascending (default), <code>DESC</code> descending. Multiple columns: the second breaks ties in the first.</p>
        <div class="code-example">-- Group by event, biggest sales within each event first
SELECT event_id, tier, price
FROM tickets
ORDER BY event_id ASC, price DESC;</div>
        <h3>LIMIT and OFFSET</h3>
        <p><code>LIMIT</code> caps rows. <code>OFFSET</code> skips. Together they paginate.</p>
        <div class="code-example">-- Top 10 most expensive transactions
SELECT id, price, purchased_at FROM tickets
ORDER BY price DESC
LIMIT 10;

-- Rows 11–20
SELECT id, price FROM tickets
ORDER BY price DESC
LIMIT 10 OFFSET 10;</div>
        <h3>Order by columns you didn't select</h3>
        <p>Perfectly legal, sometimes useful. Order by <code>purchased_at</code> even if you don't display it.</p>
      </div>

      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>Beware: ORDER BY happens <em>after</em> WHERE but <em>before</em> LIMIT. So <code>WHERE price &gt; 100 ORDER BY price DESC LIMIT 5</code> gives you the 5 most expensive among those over $100 — not the 5 most expensive in general, where you'd then keep only those over $100. Same words, different meaning.</p>
      </div>
    `,
    starter:`-- The 5 newest customers
SELECT name, signup_date, city
FROM customers
ORDER BY signup_date DESC
LIMIT 5;`,

ORDER BY purchased_at DESC
LIMIT 10;` },

        context:'The biz dev team is identifying flagship venues.',
        solution:`SELECT name, city, capacity FROM venues
ORDER BY capacity DESC

      { prompt:'Return the 3 cheapest General Admission (GA) tickets that haven\'t been refunded.',
        context:'Customer support needs a price floor for goodwill comp tickets.',
        solution:`SELECT id, event_id, price FROM tickets
WHERE tier = 'GA' AND refunded_at IS NULL

  { day:'sat', num:'04', title:'Aggregations and GROUP BY',
    kicker:'Module 4 · Aggregates',
    heading:'Counting What Matters',
    dek:'How many tickets did we sell? What\'s our average ticket price? Revenue per event? Aggregate functions collapse rows into summary numbers — and GROUP BY does it per category.',
    content:`
      <div class="section">
        <p class="lead">Aggregate functions summarize. They take a column — potentially millions of rows — and return one value.</p>
        <ul>
          <li><code>COUNT(*)</code> — number of rows</li>
          <li><code>COUNT(column)</code> — number of non-NULL values</li>
          <li><code>SUM(column)</code> — total (revenue, units sold)</li>
          <li><code>AVG(column)</code> — mean (avg ticket price)</li>
          <li><code>MIN(column)</code>, <code>MAX(column)</code> — extremes (cheapest/priciest)</li>
        </ul>
        <div class="code-example">SELECT COUNT(*) AS total_tickets,
       SUM(price) AS gross_revenue,
       AVG(price) AS avg_ticket_price,
       MAX(price) AS most_expensive
FROM tickets
WHERE status = 'valid';</div>
        <p><code>AS</code> renames a column. Use it. <code>AVG(price)</code> as a column header in a stakeholder deck looks unfinished.</p>
        <h3>GROUP BY: aggregate per category</h3>
        <p>The killer move. One number <em>per group</em>, not one across all rows.</p>
        <div class="code-example">-- Revenue by event type
SELECT event_type,
       COUNT(*) AS num_events,
       SUM(price) AS revenue
FROM events e
JOIN tickets t ON t.event_id = e.id
GROUP BY event_type;</div>
        <p>Rule: every column in SELECT must be either <em>grouped on</em> or <em>inside an aggregate</em>. Break this and the database yells (or worse, in some dialects, silently returns nonsense).</p>
        <h3>HAVING: filtering groups</h3>
        <p>WHERE filters rows <em>before</em> grouping. HAVING filters groups <em>after</em>. You can't put an aggregate in WHERE — that's what HAVING is for.</p>
        <div class="code-example">-- Cities where we've hosted more than 3 events
SELECT city, COUNT(*) AS n
FROM events
GROUP BY city
HAVING COUNT(*) &gt; 3;</div>
      </div>

      <div class="callout">
        <span class="callout-label">Mental Model</span>
        Query clauses execute in this order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT. Knowing this makes errors like "can't use a column alias in WHERE" suddenly obvious.
      </div>

      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>Ticketing-specific: <code>SUM(price) FILTER (WHERE refunded_at IS NULL)</code> in PostgreSQL gives net revenue in one expression. SQLite uses <code>SUM(CASE WHEN refunded_at IS NULL THEN price ELSE 0 END)</code>. Knowing both is a nice flex.</p>
      </div>
    `,
    starter:`-- Tickets sold per tier, with revenue
SELECT tier,
       COUNT(*) AS tickets_sold,
       SUM(price) AS revenue,
       ROUND(AVG(price), 2) AS avg_price
FROM tickets
WHERE status = 'valid'
GROUP BY tier
ORDER BY revenue DESC;`,

        solution:`SELECT e.event_type, SUM(t.price) AS gross_revenue
FROM events e

  { day:'sat', num:'05', title:'Joining Tables',
    kicker:'Module 5 · JOINs',
    heading:'Putting the Pieces Together',
    dek:'A real ticketing schema spreads info across tables — customers, events, venues, tickets all live separately. JOIN is how an analyst stitches them back together to answer a question that touches more than one.',
    content:`
      <div class="section">
        <p class="lead">In our database, <code>tickets</code> stores transactions, <code>events</code> stores show details, <code>venues</code> stores venue info, and <code>customers</code> stores buyer info. Each ticket has an <code>event_id</code>, <code>customer_id</code>, etc. that point to the related table. JOINs connect them.</p>
        <div class="code-example">SELECT t.id, e.name AS event_name, c.name AS buyer, t.price
FROM tickets AS t
JOIN events AS e ON e.id = t.event_id
JOIN customers AS c ON c.id = t.customer_id;</div>
        <p>Reading it:</p>
        <ul>
          <li><code>FROM tickets AS t</code> — start with tickets, alias <code>t</code></li>
          <li><code>JOIN events AS e ON e.id = t.event_id</code> — match each ticket to its event</li>
          <li><code>JOIN customers AS c ON c.id = t.customer_id</code> — match each ticket to its buyer</li>
        </ul>
        <h3>Types of JOIN</h3>
        <p><strong>INNER JOIN</strong> — only rows matching on both sides. (Default — <code>JOIN</code> alone means INNER.) Use when you only care about complete records.</p>
        <p><strong>LEFT JOIN</strong> — every row from the left table; right side fills in NULL when no match. The "all X, and their Y if any" pattern.</p>
        <p><strong>RIGHT JOIN</strong> — mirror of LEFT. Rare in practice; rewrite as LEFT by swapping tables.</p>
        <p><strong>FULL OUTER JOIN</strong> — everything from both sides. Uncommon.</p>
        <div class="code-example">-- All customers, plus their tickets if any
SELECT c.name, t.id AS ticket_id, t.price
FROM customers AS c
LEFT JOIN tickets AS t ON t.customer_id = c.id;</div>
        <h3>Joining many tables</h3>
        <p>Add JOINs as needed. Each gets its own ON clause.</p>
        <div class="code-example">-- The full picture: who, what, where
SELECT c.name AS buyer,
       e.name AS event,
       v.name AS venue,
       v.city,
       t.tier, t.price
FROM tickets t
JOIN customers c ON c.id = t.customer_id
JOIN events    e ON e.id = t.event_id
JOIN venues    v ON v.id = e.venue_id
WHERE e.event_date >= '2026-04-01';</div>
      </div>
      <div class="callout">
        <span class="callout-label">Always Alias</span>
        With two or more tables, aliases aren't optional — they're hygiene. Two tables both have an <code>id</code>; qualifying with the alias is the only unambiguous way to refer to one. Single-letter aliases (<code>t</code>, <code>e</code>, <code>v</code>, <code>c</code>) are conventional and they keep queries scannable.
      </div>
      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>If the interviewer says "find customers who haven't bought a ticket," your move is <code>LEFT JOIN tickets ... WHERE tickets.id IS NULL</code>. This is one of the most-tested patterns in SQL interviews — sometimes called the "anti-join." Memorize it.</p>
      </div>
    `,
    starter:`-- The headline join: every ticket with buyer, event, and venue
SELECT c.name AS buyer,
       e.name AS event,
       v.name AS venue,
       v.city,
       t.tier,
       t.price
FROM tickets t
JOIN customers c ON c.id = t.customer_id
JOIN events    e ON e.id = t.event_id
JOIN venues    v ON v.id = e.venue_id
ORDER BY t.purchased_at DESC
LIMIT 15;`,

      { prompt:'For each event, return event name, venue city, total tickets sold, and gross revenue. Only include events with at least 1 ticket sold. Sort by revenue, descending.',
        context:'The headline event-performance report. Likely your first dashboard at AXS.',
        solution:`SELECT e.name AS event,

  { day:'sun', num:'06', title:'Subqueries',
    kicker:'Module 6 · Nested Queries',
    heading:'Queries Inside Queries',
    dek:'Sometimes the answer to one question is the input to another. Subqueries let you nest them: "find tickets above the average price" is two queries — the average, then the comparison.',
    content:`
      <div class="section">
        <p class="lead">A subquery is a SELECT inside another SELECT. It computes something the outer query then uses.</p>
        <div class="code-example">-- Tickets priced above the overall average
SELECT id, price
FROM tickets
WHERE price &gt; (SELECT AVG(price) FROM tickets);</div>
        <p>Inner runs first, returns one number. Outer filters against it.</p>
        <h3>Three places a subquery lives</h3>
        <p><strong>In WHERE</strong> — comparing to a computed value (above).</p>
        <p><strong>In FROM</strong> — treat a result set as a temporary table.</p>
        <div class="code-example">-- Average ticket count per customer, by city
SELECT city, AVG(ticket_count) AS avg_tickets
FROM (
  SELECT c.city, c.id, COUNT(t.id) AS ticket_count
  FROM customers c
  LEFT JOIN tickets t ON t.customer_id = c.id
  GROUP BY c.id, c.city
) AS per_customer
GROUP BY city;</div>
        <p><strong>In SELECT</strong> — a scalar value computed per row. Use sparingly; JOINs are usually clearer.</p>
        <h3>IN with a subquery</h3>
        <p>"Whose ID appears in this set" — a constant pattern in ticketing.</p>
        <div class="code-example">-- Customers who bought tickets to any concert
SELECT name, email FROM customers
WHERE id IN (
  SELECT t.customer_id
  FROM tickets t
  JOIN events e ON e.id = t.event_id
  WHERE e.event_type = 'Concert'
);</div>
        <h3>Correlated subqueries</h3>
        <p>References the outer query, re-evaluated per outer row. Powerful, sometimes slow.</p>
        <div class="code-example">-- Customers whose biggest ticket cost more than their city's average ticket price
SELECT c.name, c.city
FROM customers c
WHERE (SELECT MAX(t.price) FROM tickets t WHERE t.customer_id = c.id) &gt;
      (SELECT AVG(t2.price) FROM tickets t2
       JOIN customers c2 ON c2.id = t2.customer_id
       WHERE c2.city = c.city);</div>
      </div>
      <div class="callout">
        <span class="callout-label">When to Reach For It</span>
        If a JOIN can express it, use a JOIN — JOINs are easier for the optimizer. Subqueries shine for computed comparisons (averages, maxes), set membership (IN / NOT IN), and existence checks (EXISTS).
      </div>
      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>"Find tickets in events where the venue has capacity over X" is naturally a JOIN. "Find tickets priced above the average for their tier" is naturally a correlated subquery (or a window function — coming up). Recognizing the right tool saves time in interviews.</p>
      </div>
    `,
    starter:`-- Tickets priced above the overall average
SELECT id, tier, price,
       (SELECT ROUND(AVG(price), 2) FROM tickets) AS avg_price
FROM tickets
WHERE price > (SELECT AVG(price) FROM tickets)
ORDER BY price DESC
LIMIT 15;`,
    exercises:[
      { prompt:'Find every event whose total ticket revenue exceeds the average revenue per event. Show event id, name, and revenue.',
        context:'Identifying top-performing events vs. the median for an executive report.',
        solution:`SELECT e.id, e.name, SUM(t.price) AS revenue
FROM events e
JOIN tickets t ON t.event_id = e.id
WHERE t.status = 'valid'
GROUP BY e.id, e.name
HAVING SUM(t.price) > (
  SELECT AVG(event_revenue) FROM (
    SELECT SUM(price) AS event_revenue
    FROM tickets WHERE status = 'valid'
    GROUP BY event_id
  )
)
ORDER BY revenue DESC;` },
      { prompt:'List every customer who has bought a ticket to a Sports event. Show name and email. Use a subquery with IN.',
        context:'Targeted re-engagement: "More games like this on sale →"',
        solution:`SELECT name, email FROM customers
WHERE id IN (
  SELECT t.customer_id
  FROM tickets t
  JOIN events e ON e.id = t.event_id
  WHERE e.event_type = 'Sports'
);` },
      { prompt:'Find tickets whose price is above the average price for their own event (not the global average).',
        context:'Premium-relative-to-show tickets — the kind worth flagging as upsell upgrades.',
        solution:`SELECT t.id, t.event_id, t.tier, t.price
FROM tickets t
WHERE t.price > (
  SELECT AVG(t2.price)
  FROM tickets t2
  WHERE t2.event_id = t.event_id
)
ORDER BY t.event_id, t.price DESC;` },
    ]

  { day:'sun', num:'07', title:'CTEs — The WITH Clause',
    kicker:'Module 7 · Common Table Expressions',
    heading:'The WITH Clause',
    dek:'Subqueries make queries powerful. CTEs make them readable. Build complex analyses in named stages — like writing prose. The single biggest quality-of-life upgrade in modern SQL.',
    content:`
      <div class="section">
        <p class="lead">A CTE (Common Table Expression) is a named subquery defined at the top of a statement. You build the answer in stages, each clearly labeled.</p>
        <div class="code-example">WITH customer_spend AS (
  SELECT customer_id, SUM(price) AS lifetime_value
  FROM tickets
  WHERE status = 'valid'
  GROUP BY customer_id
)
SELECT c.name, cs.lifetime_value
FROM customers c
JOIN customer_spend cs ON cs.customer_id = c.id
ORDER BY cs.lifetime_value DESC
LIMIT 10;</div>
        <p>Read top-to-bottom: first compute lifetime spend per customer, then join to names, sort, take top 10. It reads like an outline.</p>
        <h3>Multiple CTEs</h3>
        <p>Chain with commas. Each can reference the ones above.</p>
        <div class="code-example">WITH
  customer_spend AS (
    SELECT customer_id, SUM(price) AS lv
    FROM tickets WHERE status = 'valid'
    GROUP BY customer_id
  ),
  big_spenders AS (
    SELECT customer_id FROM customer_spend WHERE lv &gt; 1000
  ),
  their_cities AS (
    SELECT c.city, COUNT(*) AS n
    FROM customers c
    JOIN big_spenders b ON b.customer_id = c.id
    GROUP BY c.city
  )
SELECT * FROM their_cities ORDER BY n DESC;</div>
        <h3>Recursive CTEs</h3>
        <p>A CTE that references itself. Use cases: hierarchies, trees, graph traversal. Useful in ticketing for things like venue → parent venue chains, or computing "every event that's part of this tour."</p>
        <div class="code-example">-- Every event in a multi-stop tour
WITH RECURSIVE tour_events AS (
  SELECT id, name, parent_event_id, 0 AS depth
  FROM events WHERE id = 1   -- the headline event
  UNION ALL
  SELECT e.id, e.name, e.parent_event_id, te.depth + 1
  FROM events e
  JOIN tour_events te ON e.parent_event_id = te.id
)
SELECT * FROM tour_events;</div>
      </div>
      <div class="callout">
        <span class="callout-label">Style</span>
        When a query passes ~20 lines, refactor into CTEs. Each CTE does one thing. Each gets a name describing that thing. "What does this query do?" should be answerable just by reading the CTE names from top to bottom.
      </div>
      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>In a live interview, narrate your CTEs as you write them: "First I'll compute lifetime value per customer, then I'll join that back to customers, then I'll filter to the top decile." It signals senior thinking — building up to the answer rather than guessing at it.</p>
      </div>
    `,
    starter:`-- Top 5 customers by lifetime ticket spend
WITH lifetime AS (
  SELECT customer_id,
         COUNT(*) AS total_tickets,
         SUM(price) AS lv
  FROM tickets
  WHERE status = 'valid'
  GROUP BY customer_id
)
SELECT c.name, c.city, l.total_tickets, l.lv
FROM lifetime l
JOIN customers c ON c.id = l.customer_id
ORDER BY l.lv DESC
LIMIT 5;`,
    exercises:[
      { prompt:'Using a CTE: for each event_type, find the most expensive ticket sold. Show event_type, event name, and price.',
        context:'A "premium ticket benchmark" for the pricing team.',
        solution:`WITH max_per_type AS (
  SELECT e.event_type, MAX(t.price) AS top_price
  FROM events e
  JOIN tickets t ON t.event_id = e.id
  GROUP BY e.event_type
)
SELECT e.event_type, e.name, t.price
FROM events e
JOIN tickets t ON t.event_id = e.id
JOIN max_per_type m ON m.event_type = e.event_type AND m.top_price = t.price
ORDER BY t.price DESC;` },
      { prompt:'Use two CTEs to find customers whose lifetime spend is above 2× the overall average lifetime spend (the "whales").',
        context:'A VIP loyalty tier identification — the top of the pyramid.',
        solution:`WITH
  per_customer AS (
    SELECT customer_id, SUM(price) AS lv
    FROM tickets WHERE status = 'valid'
    GROUP BY customer_id
  ),
  benchmark AS (
    SELECT AVG(lv) * 2 AS threshold FROM per_customer
  )
SELECT c.name, c.email, pc.lv
FROM per_customer pc
JOIN customers c ON c.id = pc.customer_id
CROSS JOIN benchmark b
WHERE pc.lv > b.threshold
ORDER BY pc.lv DESC;` },
      { prompt:'Use CTEs to compute, for each event, the sell-through rate (tickets_sold / venue_capacity). Sort descending. Only include events with at least 50 tickets sold.',
        context:'The single most-watched metric in live event ops.',
        solution:`WITH event_sales AS (
  SELECT e.id, e.name, v.capacity,
         COUNT(t.id) AS tickets_sold
  FROM events e
  JOIN venues v ON v.id = e.venue_id
  LEFT JOIN tickets t ON t.event_id = e.id AND t.status = 'valid'
  GROUP BY e.id, e.name, v.capacity
)
SELECT name, tickets_sold, capacity,
       ROUND(100.0 * tickets_sold / capacity, 1) AS sell_through_pct

WHERE tickets_sold >= 50
ORDER BY sell_through_pct DESC;` },
    ]
  },

  { day:'sun', num:'08', title:'Window Functions',
    kicker:'Module 8 · OVER(), PARTITION BY',
    heading:'Windows',
    dek:'A window function computes across rows like an aggregate, but doesn\'t collapse them. Each row keeps its identity and gets a new column. This is the concept that separates intermediate from advanced SQL.',
    content:`
      <div class="section">
        <p class="lead">Aggregates collapse: GROUP BY turns many rows into one summary row. Window functions compute the same kinds of values <em>without</em> collapsing. Each row keeps its identity and gets a new computed column.</p>
        <div class="code-example">-- Each ticket, with its event's average price alongside
SELECT id, event_id, tier, price,
       AVG(price) OVER (PARTITION BY event_id) AS event_avg_price
FROM tickets;</div>
        <p>Every ticket row stays. Each gets a new column: the average price for its own event.</p>
        <h3>Anatomy of OVER()</h3>
        <ul>
          <li><code>PARTITION BY column</code> — split into groups (optional — without it, the window is the whole result)</li>
          <li><code>ORDER BY column</code> — order within partition (needed for ranking and running totals)</li>
        </ul>
        <h3>Ranking functions</h3>
        <ul>
          <li><code>ROW_NUMBER()</code> — 1, 2, 3, 4, 5… always unique</li>
          <li><code>RANK()</code> — 1, 2, 2, 4, 5… ties share, gaps</li>
          <li><code>DENSE_RANK()</code> — 1, 2, 2, 3, 4… ties share, no gaps</li>
        </ul>
        <div class="code-example">-- Top 3 most expensive tickets per event
SELECT event_id, id, tier, price, rnk FROM (
  SELECT event_id, id, tier, price,
         ROW_NUMBER() OVER (PARTITION BY event_id ORDER BY price DESC) AS rnk
  FROM tickets
)
WHERE rnk &lt;= 3;</div>
        <h3>LAG and LEAD</h3>
        <p>Reach back or forward in the ordered window. Great for deltas and trends.</p>
        <div class="code-example">-- Day-over-day ticket sales change
SELECT sale_date, tickets_sold,
       LAG(tickets_sold) OVER (ORDER BY sale_date) AS prev_day,
       tickets_sold - LAG(tickets_sold) OVER (ORDER BY sale_date) AS delta
FROM (
  SELECT DATE(purchased_at) AS sale_date, COUNT(*) AS tickets_sold
  FROM tickets
  GROUP BY DATE(purchased_at)
);</div>
        <h3>Running totals</h3>
        <p>Aggregate plus ORDER BY in the window equals running total. The bread and butter of revenue dashboards.</p>
        <div class="code-example">SELECT DATE(purchased_at) AS day,
       SUM(price) AS day_revenue,
       SUM(SUM(price)) OVER (ORDER BY DATE(purchased_at)) AS running_revenue
FROM tickets
WHERE status = 'valid'
GROUP BY DATE(purchased_at)
ORDER BY day;</div>
      </div>
      <div class="callout">
        <span class="callout-label">Why It's a Superpower</span>
        Replace ten lines of correlated subqueries with one window function. "Top N per group," "running totals," "month-over-month change," "percentile rank" — all one-liners. If you learn exactly one advanced concept this weekend, make it this one.
      </div>
      <div class="interview-tip">
        <div class="interview-tip-label">Interview Tip</div>
        <p>Window functions are <em>the</em> most-tested advanced SQL topic in data analyst interviews at companies like AXS. Expect at least one question that requires <code>ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)</code>. Practice the "top N per group" pattern until it's reflex.</p>
      </div>
    `,
    starter:`-- Rank customers by total spend within their city
WITH customer_lv AS (
  SELECT c.id, c.name, c.city, COALESCE(SUM(t.price), 0) AS lv
  FROM customers c
  LEFT JOIN tickets t ON t.customer_id = c.id AND t.status = 'valid'
  GROUP BY c.id, c.name, c.city
)
SELECT city, name, lv,
       RANK() OVER (PARTITION BY city ORDER BY lv DESC) AS city_rank
FROM customer_lv
ORDER BY city, city_rank;`,

      { prompt:'Compute monthly gross revenue for the last 12 months. Return year-month and revenue, ordered chronologically. Use strftime(\'%Y-%m\', purchased_at).',
        context:'The "trended revenue" chart on every executive dashboard.',
        solution:`SELECT strftime('%Y-%m', purchased_at) AS month,
       ROUND(SUM(price), 2) AS gross_revenue,
       COUNT(*) AS tickets_sold

      { prompt:'Sell-through rate per event: tickets_sold / venue_capacity, expressed as a percentage. Include event name, city, capacity, sold, and percentage. Sort descending.',
        context:'The single most-asked metric at any live events company. Drives capacity planning.',
        solution:`SELECT e.name AS event,
       v.city,
       v.capacity,
       COUNT(t.id) AS tickets_sold,
       ROUND(100.0 * COUNT(t.id) / v.capacity, 1) AS sell_through_pct
FROM events e
JOIN venues v ON v.id = e.venue_id
LEFT JOIN tickets t ON t.event_id = e.id AND t.status = 'valid'
GROUP BY e.id, e.name, v.city, v.capacity
ORDER BY sell_through_pct DESC;` },
      { prompt:'For each city, find the top 3 customers by lifetime ticket spend. Show city, customer name, lifetime value, and rank within the city.',
        context:'A "VIP customers per market" report — used for invite-only event launches.',
        solution:`WITH customer_lv AS (
  SELECT c.city, c.id, c.name, SUM(t.price) AS lv
  FROM customers c
  JOIN tickets t ON t.customer_id = c.id AND t.status = 'valid'
  GROUP BY c.id, c.city, c.name
)
SELECT city, name, lv, rnk FROM (
  SELECT city, name, lv,
         RANK() OVER (PARTITION BY city ORDER BY lv DESC) AS rnk
  FROM customer_lv
)
WHERE rnk <= 3
ORDER BY city, rnk;` },
      { prompt:'Find "repeat buyers": customers with 3+ tickets purchased on at least 2 different dates. Show name, total tickets, distinct purchase days, and lifetime spend.',

        solution:`SELECT c.name,
       COUNT(*) AS total_tickets,
       COUNT(DISTINCT DATE(t.purchased_at)) AS distinct_days,
       SUM(t.price) AS lifetime_spend
FROM customers c
JOIN tickets t ON t.customer_id = c.id
WHERE t.status = 'valid'
GROUP BY c.id, c.name
HAVING COUNT(*) >= 3
   AND COUNT(DISTINCT DATE(t.purchased_at)) >= 2

FROM events e

GROUP BY e.event_type

      { prompt:'For each customer who has bought ≥2 tickets, show their name, time between their first and most recent purchase (in days), and average days between consecutive purchases. (Hint: window function with LAG, then aggregate.)',
        context:'A purchase-cadence analysis — feeds into when to send re-marketing emails.',
        solution:`WITH gaps AS (
  SELECT t.customer_id,
         t.purchased_at,
         julianday(t.purchased_at) - julianday(
           LAG(t.purchased_at) OVER (PARTITION BY t.customer_id ORDER BY t.purchased_at)
         ) AS days_since_prev
  FROM tickets t
  WHERE t.status = 'valid'
)
SELECT c.name,
       COUNT(*) AS total_purchases,
       CAST(julianday(MAX(g.purchased_at)) - julianday(MIN(g.purchased_at)) AS INTEGER) AS span_days,
       ROUND(AVG(g.days_since_prev), 1) AS avg_days_between
FROM gaps g
JOIN customers c ON c.id = g.customer_id
GROUP BY c.id, c.name
HAVING COUNT(*) >= 2
ORDER BY avg_days_between ASC;` },

const DB_SEED = `
CREATE TABLE venues (
  id INTEGER PRIMARY KEY,
  name TEXT NOT NULL,
  city TEXT,
  state TEXT,
  capacity INTEGER,
  venue_type TEXT
);

CREATE TABLE events (
  id INTEGER PRIMARY KEY,
  name TEXT NOT NULL,
  event_type TEXT,
  event_date DATE,
  venue_id INTEGER,
  city TEXT,
  status TEXT,
  parent_event_id INTEGER,
  FOREIGN KEY (venue_id) REFERENCES venues(id)
);

CREATE TABLE customers (
  id INTEGER PRIMARY KEY,
  name TEXT NOT NULL,
  email TEXT,
  city TEXT,
  state TEXT,
  signup_date DATE
);

CREATE TABLE tickets (
  id INTEGER PRIMARY KEY,
  event_id INTEGER,
  customer_id INTEGER,
  tier TEXT,
  seat TEXT,
  price REAL,
  purchased_at DATETIME,
  status TEXT,
  refunded_at DATE,
  FOREIGN KEY (event_id) REFERENCES events(id),
  FOREIGN KEY (customer_id) REFERENCES customers(id)
);

CREATE TABLE artists (
  id INTEGER PRIMARY KEY,
  name TEXT NOT NULL,
  genre TEXT
);

CREATE TABLE event_artists (
  event_id INTEGER,
  artist_id INTEGER,
  is_headliner INTEGER,
  PRIMARY KEY (event_id, artist_id),
  FOREIGN KEY (event_id) REFERENCES events(id),
  FOREIGN KEY (artist_id) REFERENCES artists(id)
);

let SQL, db;
const state = {
  currentLesson: 0,
  completed: new Set(),
};

function loadProgress() {
  try {
    const raw = localStorage.getItem('sql_weekend_progress_v2');
    if (raw) {
      const data = JSON.parse(raw);
      state.currentLesson = data.currentLesson || 0;
      state.completed = new Set(data.completed || []);
    }
  } catch(e) {}
}
function saveProgress() {
  try {
    localStorage.setItem('sql_weekend_progress_v2', JSON.stringify({
      currentLesson: state.currentLesson,
      completed: [...state.completed],
    }));
  } catch(e) {}
}
function resetProgress() {
  if (!confirm('Reset all progress? This clears your completed lessons.')) return;
  state.currentLesson = 0;
  state.completed = new Set();
  saveProgress();
  loadDatabase();
  renderSidebar();
  renderLesson();
}

async function initSQL() {
  SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
  });
  loadDatabase();
}
function loadDatabase() {
  db = new SQL.Database();
  db.exec(DB_SEED);
}
function runQuery(sql) {
  try {
    const res = db.exec(sql);
    return { ok: true, results: res };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

function renderMasthead() {
  const pct = (state.completed.size / lessons.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `Progress ${state.completed.size} / ${lessons.length}`;
}

function renderSidebar() {
  const sat = document.getElementById('saturday-lessons');
  const sun = document.getElementById('sunday-lessons');
  sat.innerHTML = '';
  sun.innerHTML = '';
  lessons.forEach((l, i) => {
    const item = document.createElement('div');
    item.className = 'lesson-item' + (i === state.currentLesson ? ' active' : '');
    const done = state.completed.has(i);
    item.innerHTML = `
      <span class="lesson-num">${l.num}</span>
      <span class="lesson-title">${l.title}</span>
      ${done ? '<span class="lesson-check">✓</span>' : ''}
    `;
    item.onclick = () => { state.currentLesson = i; renderLesson(); renderSidebar(); saveProgress(); };
    if (l.day === 'sat') sat.appendChild(item); else sun.appendChild(item);
  });
  renderMasthead();
}

function renderLesson() {
  const l = lessons[state.currentLesson];
  const main = document.getElementById('main-content');
  window.scrollTo({top:0, behavior:'smooth'});

  const isFirst = state.currentLesson === 0;
  const scheduleBlock = isFirst ? `
    <div class="section">
      <h2>The Weekend Plan</h2>
      <p>Ten lessons across two days, every example built on a live ticketing database. Saturday is foundations. Sunday is advanced — including the kinds of questions a ticketing analyst at AXS would actually be asked.</p>
      <div class="schedule">
        <div class="schedule-day">
          <div class="schedule-day-title">Saturday</div>
          <div class="schedule-day-meta">Foundations · ~4 hours</div>
          <div class="schedule-items">
            <span class="schedule-chip">01 · SELECT basics</span>
            <span class="schedule-chip">02 · WHERE</span>
            <span class="schedule-chip">03 · ORDER BY / LIMIT</span>
            <span class="schedule-chip">04 · Aggregates &amp; GROUP BY</span>
            <span class="schedule-chip">05 · JOINs</span>
          </div>
        </div>
        <div class="schedule-day">
          <div class="schedule-day-title">Sunday</div>
          <div class="schedule-day-meta">Advanced · ~4 hours</div>
          <div class="schedule-items">
            <span class="schedule-chip">06 · Subqueries</span>
            <span class="schedule-chip">07 · CTEs</span>
            <span class="schedule-chip">08 · Window functions</span>
            <span class="schedule-chip">09 · INSERT / UPDATE / DELETE</span>
            <span class="schedule-chip">10 · Interview-style challenges</span>
          </div>
        </div>
      </div>
      <p>Everything runs in your browser — no setup, nothing to install. Progress saves automatically across lessons. The database persists for the session; reload the page if you want a fresh copy.</p>
      <div class="callout">
        <span class="callout-label">The Dataset</span>
        A live event ticketing platform with 12 venues, 24 events (concerts, sports, comedy), 35 customers, 100+ ticket transactions, and 10 artists tied to events. Designed to mirror the kind of schema you\'d encounter in a ticketing data warehouse — including refunds, multi-tier pricing, and tour relationships.
      </div>
    </div>
  ` : '';

  main.innerHTML = `
    <div class="article-header">
      <div class="article-kicker">${l.kicker}</div>
      <h1 class="article-title">${l.heading}</h1>
      <p class="article-dek">${l.dek}</p>
      <div class="article-meta">
        <span>Lesson ${l.num} / 10</span>
        <span>·</span>
        <span>${l.day === 'sat' ? 'Saturday' : 'Sunday'}</span>
      </div>
    </div>
    ${l.content}
    ${scheduleBlock}

    <div class="editor-block">
      <div class="editor-header">
        <span class="editor-header-label">▸ Try It — Live Query Editor</span>
        <span style="opacity:0.6">SQLite · in-browser</span>
      </div>
      <textarea class="editor-textarea" id="editor" spellcheck="false">${l.starter}</textarea>
      <div class="editor-actions">
        <button onclick="executeQuery()">Run Query</button>
        <button class="secondary" onclick="resetEditor()">Reset</button>
        <button class="ghost" onclick="loadDatabase()">Reload Database</button>
      </div>
      <div id="results" class="results" style="display:none"></div>
    </div>

    ${l.exercises.map((ex, i) => `
      <div class="exercise">
        <div class="exercise-label">
          <span>Exercise ${i+1}</span>
          <button class="ghost" onclick="toggleSolution(${i})" style="padding:3px 10px;font-size:10px">Show Solution</button>
        </div>
        ${ex.context ? `<div class="business-context">📋 ${ex.context}</div>` : ''}
        <div class="exercise-prompt">${ex.prompt}</div>
        <button class="secondary" onclick="loadIntoEditor(${i})">Try in Editor ↑</button>
        <div class="solution" id="solution-${i}">
          <div class="solution-label">Solution</div>
          <div class="code-example">${escapeHtml(ex.solution)}</div>
        </div>
      </div>
    `).join('')}

    <div class="lesson-nav">
      ${state.currentLesson > 0 ? `
        <div class="nav-btn" onclick="goto(${state.currentLesson-1})">
          <span class="nav-label">← Previous</span>
          <span class="nav-title">${lessons[state.currentLesson-1].title}</span>
        </div>` : '<div></div>'}
      ${state.currentLesson < lessons.length-1 ? `
        <div class="nav-btn next" onclick="markDoneAndNext()">
          <span class="nav-label">Mark done &amp; continue →</span>
          <span class="nav-title">${lessons[state.currentLesson+1].title}</span>
        </div>` : `
        <div class="nav-btn next" onclick="markDone()">
          <span class="nav-label">Mark done ✓</span>
          <span class="nav-title">Finish Course</span>
        </div>`}
    </div>
  `;
  window._currentEx = l.exercises;
  window._starter = l.starter;
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function executeQuery() {
  const sql = document.getElementById('editor').value;
  const out = document.getElementById('results');
  out.style.display = 'block';
  const r = runQuery(sql);
  if (!r.ok) {
    out.innerHTML = `<div class="results-meta">Error</div><div class="results-error">${escapeHtml(r.error)}</div>`;
    return;
  }
  if (!r.results.length) {
    out.innerHTML = `<div class="results-meta">Executed · No rows returned</div>`;
    return;
  }
  const html = r.results.map(rs => {
    const cols = rs.columns.map(c => `<th>${escapeHtml(c)}</th>`).join('');
    const rows = rs.values.map(row =>
      `<tr>${row.map(v => `<td>${v === null ? '<em style="color:#999">NULL</em>' : escapeHtml(String(v))}</td>`).join('')}</tr>`
    ).join('');
    return `
      <div class="results-meta">${rs.values.length} row${rs.values.length===1?'':'s'}</div>
      <table class="results-table"><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody></table>
    `;
  }).join('<div style="height:10px"></div>');
  out.innerHTML = html;
}

function resetEditor() {
  document.getElementById('editor').value = window._starter;
  document.getElementById('results').style.display = 'none';
}
function loadIntoEditor(i) {
  document.getElementById('editor').value = `-- ${window._currentEx[i].prompt}\n\n`;
  document.getElementById('editor').focus();
  document.getElementById('editor').scrollIntoView({behavior:'smooth', block:'center'});
}
function toggleSolution(i) {
  document.getElementById(`solution-${i}`).classList.toggle('open');
}
function goto(i) {
  state.currentLesson = i;
  renderLesson(); renderSidebar(); saveProgress();
}
function markDone() {
  state.completed.add(state.currentLesson);
  saveProgress(); renderSidebar();
}
function markDoneAndNext() {
  state.completed.add(state.currentLesson);
  state.currentLesson++;
  saveProgress(); renderLesson(); renderSidebar();
}

function renderSchema() {
  const s = document.getElementById('schema-content');
  const tables = [
    { name: 'venues', cols: 'id, name, city, state, capacity, venue_type', desc: 'Arenas, theaters, amphitheaters, stadiums.' },
    { name: 'events', cols: 'id, name, event_type, event_date, venue_id → venues.id, city, status, parent_event_id → events.id', desc: 'Concerts, sports, comedy. parent_event_id links tour stops; city is denormalized from venue for convenience.' },
    { name: 'customers', cols: 'id, name, email, city, state, signup_date', desc: 'AXS account holders.' },
    { name: 'tickets', cols: 'id, event_id → events.id, customer_id → customers.id, tier, seat, price, purchased_at, status, refunded_at', desc: 'The transactions table — heart of the schema.' },
    { name: 'artists', cols: 'id, name, genre', desc: 'Performers attached to events.' },
    { name: 'event_artists', cols: 'event_id → events.id, artist_id → artists.id, is_headliner', desc: 'Many-to-many bridge between events and artists.' },
  ];
  s.innerHTML = tables.map(t => `
    <div class="schema-table">
      <div class="schema-table-name">${t.name}</div>
      <div style="font-family:'Fraunces',serif;font-style:italic;color:var(--ink-dim);font-size:12px;margin-bottom:4px;padding-left:12px">${t.desc}</div>
      <div class="schema-cols">${t.cols.split(',').map(c => `<span>·</span> ${c.trim()}`).join('<br>')}</div>
    </div>
  `).join('');
}

(async () => {
  loadProgress();
  await initSQL();
  renderSidebar();
  renderLesson();
  renderSchema();
  document.getElementById('loading').classList.add('hide');
})();
